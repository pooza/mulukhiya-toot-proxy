$schema: http://json-schema.org/draft-04/hyper-schema
properties:
  account:
    properties:
      is_cat:
        properties:
          cache:
            properties:
              ttl:
                minimum: 0
                type: integer
            required:
              - ttl
            type: object
        required:
          - cache
        type: object
    required:
      - is_cat
    type: object
  agent:
    properties:
      accts:
        items:
          type: string
        type: array
      info:
        properties:
          announcement:
            properties:
              template:
                type: string
            type: object
          token:
            type: string
          username:
            type: string
          webhook:
            properties:
              secret:
                type: string
            type: object
          welcome:
            properties:
              template:
                type: string
            required:
              - template
            type: object
        type: object
      test:
        properties:
          token:
            type: string
          username:
            type: string
        type: object
    type: object
  annict:
    properties:
      episodes:
        properties:
          ruby:
            properties:
              pattern:
                format: regex
                type: string
              trim:
                type: boolean
            type: object
        type: object
      oauth:
        properties:
          client:
            properties:
              id:
                type: string
              secret:
                type: string
            required:
              - id
              - secret
            type: object
        required:
          - client
        type: object
      works:
        items:
          format: regex
          type: string
        type: array
    required:
      - oauth
    type: object
  api:
    properties:
      cache:
        properties:
          ttl:
            minimum: 0
            type: integer
        required:
          - ttl
        type: object
      custom:
        items:
          properties:
            command:
              items:
                type: string
              type: array
            description:
              type: string
            dir:
              type: string
            path:
              type: string
          required:
            - path
            - command
          type: object
        type: array
    type: object
  controller:
    enum:
      - mastodon
      - misskey
    type: string
  diag:
    properties:
      enable:
        type: boolean
    type: object
  crypt:
    properties:
      encoder:
        enum:
          - base64
          - hex
        type: string
      password:
        minLength: 8
        type: string
      salt:
        minLength: 8
        type: string
    required:
      - password
    type: object
  environment:
    enum:
      - development
      - production
    type: string
  feed:
    properties:
      custom:
        items:
          properties:
            command:
              items:
                type: string
              type: array
            description:
              type: string
            link:
              format: uri
              type: string
            path:
              format: ^/
              type: string
            title:
              type: string
          required:
            - path
            - command
          type: object
        type: array
    type: object
  google:
    properties:
      api:
        properties:
          key:
            type: string
        required:
          - key
        type: object
    required:
      - api
    type: object
  peer_tube:
    properties:
      hosts:
        properties:
          default:
            format: hostname
            type: string
        type: object
    type: object
  piefed:
    properties:
      api:
        properties:
          version:
            type: string
      communities:
        properties:
          limit:
            minimum: 0
            type: integer
        type: object
      hosts:
        properties:
          default:
            format: hostname
            type: string
        type: object
      subject:
        properties:
          max_length:
            minimum: 0
            type: integer
    type: object
  postgres:
    properties:
      dsn:
        format: uri
        type: string
      pool:
        properties:
          size:
            minimum: 1
            maximum: 64
            type: integer
          timeout:
            minimum: 1
            maximum: 60
            type: integer
        type: object
      query_log:
        type: boolean
      slow_query:
        properties:
          seconds:
            minimum: 0
            type: integer
        required:
          - seconds
        type: object
    required:
      - dsn
    type: object
  program:
    properties:
      urls:
        items:
          format: uri
          type: string
        type: array
    required:
      - urls
    type: object
  puma:
    properties:
      port:
        minimum: 1
        type: integer
      restart:
        properties:
          seconds:
            minimum: 0
            type: integer
        required:
          - seconds
        type: object
      threads:
        minimum: 1
        type: integer
      workers:
        minimum: 0
        type: integer
    type: object
  ruby:
    properties:
      did_you_mean:
        type: boolean
    type: object
  sidekiq:
    properties:
      auth:
        properties:
          password:
            minLength: 8
            type: string
          user:
            type: string
        type: object
      concurrency:
        minimum: 1
        type: integer
      redis:
        properties:
          dsn:
            format: uri
            type: string
        required:
          - dsn
        type: object
      schedule:
        type: object
    type: object
  sentry:
    properties:
      dsn:
        format: uri
        type: string
      scrub_patterns:
        items:
          format: regex
          type: string
        type: array
      traces_sample_rate:
        maximum: 1
        minimum: 0
        type: number
    type: object
  service:
    type: object
  spoiler:
    properties:
      emoji:
        type: string
      pattern:
        format: regex
        type: string
    type: object
  status_url:
    format: uri
    type: string
  spotify:
    properties:
      client:
        properties:
          id:
            type: string
          secret:
            type: string
        required:
          - id
          - secret
        type: object
    required:
      - client
    type: object
  user_config:
    properties:
      redis:
        properties:
          dsn:
            format: uri
            type: string
        required:
          - dsn
        type: object
    type: object
  webui:
    properties:
      media:
        properties:
          catalog:
            properties:
              limit:
                minimum: 10
                type: integer
            required:
              - limit
            type: object
          copyright:
            properties:
              message:
                type: string
              url:
                format: uri
                type: string
            type: object
        type: object
      status:
        properties:
          timeline:
            properties:
              limit:
                minimum: 10
                type: integer
            required:
              - limit
            type: object
        required:
          - timeline
        type: object
    type: object
required:
  - crypt
title: Local config
type: object
